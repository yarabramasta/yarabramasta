name: Deploy on Push
'on':
  push:
    branches:
      - dev
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: "Install Dependencies"
      - run: npm ci
      - name: "Build Project"
      - run: npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_BRAM_ASTA }}'
          channelId: live
          projectId: bram-asta
        env:
          FIREBASE_CLI_PREVIEWS: hostingchannels
